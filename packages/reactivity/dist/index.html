<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="importmap">
      {
        "imports": {
          "vue": "../../../node_modules/vue/dist/vue.esm-browser.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      // import { reactive, effect, ref } from "vue";
      import { reactive, effect, ref } from "./reactivity.js";

      const flag = ref(true);
      console.log("flag", flag);
      console.log("flag.value", flag.value);

      effect(() => {
        document.querySelector("#app").innerHTML = flag.value ? "sdf" : 18;
      });

      setTimeout(() => {
        flag.value = false;
      }, 1000);
    </script>
  </body>
</html>
