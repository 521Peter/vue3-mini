<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="importmap">
      {
        "imports": {
          "vue": "../../../node_modules/vue/dist/vue.esm-browser.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      // import { reactive, effect } from "vue";
      import { reactive, effect } from "./reactivity.js";
      let obj = { name: "张三", age: 18, flag: true };

      const state = reactive(obj);

      let runner = effect(
        () => {
          console.log("running");

          document.querySelector("#app").innerHTML = state.flag
            ? state.name
            : state.age;
        },
        {
          scheduler: () => {
            console.log("数据更新了，不重新渲染，走自己的逻辑");
            console.log("runner", runner.effect);
            runner();
          },
        },
      );

      setTimeout(() => {
        state.flag = false;
      }, 1000);

      // effect(() => {
      //   document.querySelector("#app").innerHTML =
      //     state.flag + state.flag + state.flag;
      // });
    </script>
  </body>
</html>
